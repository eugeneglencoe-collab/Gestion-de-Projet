<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AgenceBoard</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<header class="app-header">
  <h1>AgenceBoard</h1>
  <button onclick="openModal()">+ Nouvelle tâche</button>
</header>

<main>
  <div id="board"></div>
</main>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="modal-content">
    <h2>Nouvelle tâche</h2>

    <input id="task-title" placeholder="Titre"/>

    <!-- ✅ CLIENT DYNAMIQUE -->
    <select id="modal-client" onchange="handleClientSelect(this)">
      <option value="">— Choisir —</option>
    </select>

    <button onclick="saveTask()">Enregistrer</button>
    <button onclick="closeModal()">Fermer</button>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
